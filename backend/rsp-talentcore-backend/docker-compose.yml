services:
  discovery:
    build:
      context: ./rsp-talentcore-discovery
    container_name: talentcore-discovery
    environment:
      PORT: 8761
      EUREKA_HOSTNAME: discovery
    ports:
      - "8761:8761"

  auth-service:
    build:
      context: ./rsp-talentcore-auth-service
    container_name: talentcore-auth
    depends_on:
      - discovery
    environment:
      PORT: 8081
      EUREKA_SERVER_URL: http://discovery:8761/eureka/
      DB_URL: jdbc:mysql://host.docker.internal:3306/talentcore_auth
      DB_USERNAME: talentcore_user
      DB_PASSWORD: root
      JWT_SECRET: TalentCoreSecretKeyForJWTAuthenticationAndAuthorization2026DevelopmentEnvironmentOnly
    ports:
      - "8081:8081"

  core-service:
    build:
      context: ./rsp-talentcore-core-service
    container_name: talentcore-core
    depends_on:
      - discovery
    environment:
      PORT: 8082
      EUREKA_SERVER_URL: http://discovery:8761/eureka/
      DB_URL: jdbc:mysql://host.docker.internal:3306/talentcore_core
      DB_USERNAME: talentcore_user
      DB_PASSWORD: root
      JWT_SECRET: TalentCoreSecretKeyForJWTAuthenticationAndAuthorization2026DevelopmentEnvironmentOnly
    ports:
      - "8082:8082"

  gateway:
    build:
      context: ./rsp-talentcore-gateway
    container_name: talentcore-gateway
    depends_on:
      - discovery
      - auth-service
      - core-service
    environment:
      PORT: 8080
      EUREKA_SERVER_URL: http://discovery:8761/eureka/
    ports:
      - "8080:8080"

volumes:
  mysql_data: