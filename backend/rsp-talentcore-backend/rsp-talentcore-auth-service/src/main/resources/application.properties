spring.application.name=rsp-talentcore-auth-service
server.port=${SERVER_PORT:8081}
debug=false

# Eureka
eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/talentcore_auth}
spring.datasource.username=${DB_USERNAME:talentcore_user}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

logging.level.root=INFO
logging.level.org.springframework=WARN
logging.level.com.rsp.talentcore=INFO
logging.level.com.nexora.rsp.talentcore=INFO
logging.level.org.flywaydb=INFO
logging.level.org.springframework.boot.autoconfigure.flyway=WARN

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# JWT token
jwt.secret=${JWT_SECRET:TalentCoreSecretKeyForJWTAuthenticationAndAuthorization123456}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:2592000000}

logging.level.org.springframework.security=${SPRING_SECURITY_LOG_LEVEL:INFO}
logging.level.org.springframework.security.oauth2=${SPRING_SECURITY_OAUTH2_LOG_LEVEL:INFO}