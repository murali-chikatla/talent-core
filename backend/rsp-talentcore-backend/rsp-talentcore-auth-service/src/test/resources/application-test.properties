spring.application.name=rsp-talentcore-auth-service
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.h2.console.enabled=true
eureka.client.enabled=false
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.com.nexora.rsp.talentcore=WARN
jwt.secret=TalentCoreTestSecretKeyForJWTAuthenticationAndAuthorization123456
jwt.access-expiration=900000
jwt.refresh-expiration=2592000000
